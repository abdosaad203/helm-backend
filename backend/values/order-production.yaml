replicaCount: 2

image:
  repository: ghcr.io/abdosaad203/order-api
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

pvc:
  enabled: true
  storageClass: gp2
  accessMode: ReadWriteOnce
  size: 2Gi
  mountPath: /app/logs

config:
  enabled: true
  data:
    ASPNETCORE_ENVIRONMENT: Production
    CatalogApi__BaseUrl: http://catalog-api-backend:8080

externalSecret:
  enabled: true
  secretName: order-api-secret
  data:
    ConnectionStrings__Default: ecommerce-db-connection

    Jwt__Key: ecommerce-jwt-key
    Jwt__Issuer: ecommerce-jwt-issuer
    Jwt__Audience: ecommerce-jwt-audience

migration:
  enabled: false