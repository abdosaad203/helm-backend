replicaCount: 2

image:
  repository: ghcr.io/abdosaad203/catalog-api
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

pvc:
  enabled: true
  storageClass: gp2
  accessMode: ReadWriteOnce
  size: 2Gi
  mountPath: /app/logs

config:
  ASPNETCORE_ENVIRONMENT: Production

externalSecret:
  enabled: true
  secretName: catalog-api-secret
  data:
    DB_HOST: ecommerce-db-host
    DB_NAME: ecommerce-db-name
    DB_USER: ecommerce-db-user
    DB_PASS: ecommerce-db-pass

    JWT_KEY: jwt-key
    JWT_ISSUER: jwt-issuer
    JWT_AUDIENCE: jwt-audience

migration:
  enabled: false