replicaCount: 2

image:
  repository: ghcr.io/abdosaad203/identity-api
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

pvc:
  enabled: true
  storageClass: gp2
  accessMode: ReadWriteOnce
  size: 2Gi
  mountPath: /app/logs

config:
  ASPNETCORE_ENVIRONMENT: Production

externalSecret:
  enabled: true
  secretName: identity-api-prod-secret

  data:
    DB_HOST: Production-db-host
    DB_NAME: Production-db-name
    DB_USER: Production-db-user
    DB_PASS: Production-db-pass

    ConnectionStrings__Default: Production-db-connection

    Jwt__Key: ecommerce-jwt-key
    Jwt__Issuer: ecommerce-jwt-issuer
    Jwt__Audience: ecommerce-jwt-audience

migration:
  enabled: true