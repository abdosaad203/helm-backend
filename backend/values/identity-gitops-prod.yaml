replicaCount: 2

image:
  repository: ghcr.io/abdosaad203/identity-api
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

pvc:
  enabled: true
  storageClass: gp2
  accessMode: ReadWriteOnce
  size: 2Gi
  mountPath: /app/logs

config:
  ASPNETCORE_ENVIRONMENT: Production

externalSecret:
  enabled: true
  secretName: identity-api-secret
  data:
    DB_HOST: ecommerce-db-host
    DB_NAME: ecommerce-db-name
    DB_USER: ecommerce-db-user
    DB_PASS: ecommerce-db-pass

migration:
  enabled: true

schemaSql: |
  CREATE DATABASE IF NOT EXISTS ecommerce;