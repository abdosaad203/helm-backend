replicaCount: 1

image:
  repository: ghcr.io/abdosaad203/catalog-api
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

pvc:
  enabled: true
  storageClass: gp2
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /app/logs

config:
  ASPNETCORE_ENVIRONMENT: Staging

externalSecret:
  enabled: true
  secretName: catalog-api-stg-secret
  data:
    DB_HOST: staging-db-host
    DB_NAME: staging-db-name
    DB_USER: staging-db-user
    DB_PASS: staging-db-pass

    Jwt__Key: ecommerce-jwt-key
    Jwt__Issuer: ecommerce-jwt-issuer
    Jwt__Audience: ecommerce-jwt-audience

migration:
  enabled: false