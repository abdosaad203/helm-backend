replicaCount: 1

image:
  repository: ghcr.io/abdosaad203/identity-api
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

pvc:
  enabled: true
  storageClass: gp2
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /app/logs

config:
  ASPNETCORE_ENVIRONMENT: Staging

externalSecret:
  enabled: true
  secretName: identity-api-stg-secret
  data:
    ConnectionStrings__Default: ecommerce-db-connection

    Jwt__Key: ecommerce-jwt-key
    Jwt__Issuer: ecommerce-jwt-issuer
    Jwt__Audience: ecommerce-jwt-audience

migration:
  enabled: false